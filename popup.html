<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --bg: #ffffff;
        --fg: #0f0f0f;
        --muted: #606060;
        --border: #e5e5e5;
        --accent: #065fd4;
        --chip: #f2f2f2;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f0f0f;
          --fg: #f1f1f1;
          --muted: #aaaaaa;
          --border: #303030;
          --accent: #3ea6ff;
          --chip: #272727;
        }
      }
      * { box-sizing: border-box; }
      body {
        width: 420px;
        max-height: 560px;
        margin: 0;
        font-family: "Roboto", system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--fg);
      }
      header {
        position: sticky;
        top: 0;
        background: var(--bg);
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      header h1 { font-size: 14px; margin: 0; font-weight: 600; }
      #clear {
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
        border-radius: 16px;
        padding: 4px 12px;
        font-size: 12px;
        cursor: pointer;
      }
      #clear:hover { color: var(--fg); }
      .snapshot { border-bottom: 1px solid var(--border); }
      .snap-head {
        padding: 10px 14px 6px;
        display: flex;
        align-items: baseline;
        gap: 8px;
        cursor: pointer;
        user-select: none;
      }
      .badge {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        background: var(--chip);
        color: var(--muted);
        padding: 2px 7px;
        border-radius: 10px;
      }
      .context {
        font-size: 12px;
        font-weight: 500;
        color: var(--fg);
        flex: 0 1 auto;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .when { font-size: 11px; color: var(--muted); margin-left: auto; white-space: nowrap; flex-shrink: 0; }
      .badge { flex-shrink: 0; }
      ul { list-style: none; margin: 0; padding: 0 14px 10px; }
      li { padding: 4px 0; font-size: 13px; line-height: 1.3; }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      .chan { color: var(--muted); font-size: 11px; }
      .short-tag {
        display: inline-block;
        margin-left: 6px;
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        vertical-align: middle;
        background: #f0284a;
        color: #fff;
        padding: 1px 5px;
        border-radius: 8px;
      }
      .empty { padding: 30px 14px; text-align: center; color: var(--muted); font-size: 13px; }
      .collapsed ul { display: none; }
    </style>
  </head>
  <body>
    <header>
      <h1>Recommendation snapshots</h1>
      <button id="clear">Clear all</button>
    </header>
    <div id="list"></div>
    <script src="popup.js"></script>
  </body>
</html>
